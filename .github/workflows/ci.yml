# Fieldlight mesh: Python SIL layer + optional Go libp2p probe build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mesh-python:
    name: Mesh Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04_infrastructure/mesh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 04_infrastructure/mesh/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Compile & CLI smoke
        run: |
          python -m compileall fieldlight_mesh scripts -q
          python scripts/sil_mesh.py receive --help >/dev/null
          python scripts/sil_mesh.py send --help >/dev/null
          python scripts/sil_mesh.py discover --help >/dev/null

  libp2p-probe:
    name: libp2p peer probe (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04_infrastructure/mesh/discovery/libp2p_peer_probe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 04_infrastructure/mesh/discovery/libp2p_peer_probe/go.mod
          cache-dependency-path: 04_infrastructure/mesh/discovery/libp2p_peer_probe/go.sum

      - name: go build
        run: go build -v -o /tmp/libp2p_peer_probe .
