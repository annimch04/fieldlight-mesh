# Machine-readable routing schema (mirrors lemur_route_schema.yml.md).
# Used by the SIL TCP mesh layer (fieldlight_mesh).

routes:
  handshake:
    trust_required: peer
    ttl: 2
    fallback: [proxy]
    destination_format: "mesh://{peer_id}"
    auth: gpg_sig
    log: true
    msg_id: auto

  trace:
    trust_required: peer
    ttl: 5
    fallback: [proxy, ghost]
    destination_format: "mesh://{node_id}/trace"
    auth: gpg_sig
    log: true
    msg_id: auto

  query:
    trust_required: peer
    ttl: 3
    fallback: [ghost]
    destination_format: "mesh://{target}/query"
    auth: gpg_sig
    log: true
    msg_id: auto

  echo:
    trust_required: ghost
    ttl: 1
    fallback: []
    destination_format: self
    auth: none
    log: true
    msg_id: auto

  # ping: minimal reachability test — no GPG required (auth optional).
  # Handler must return response intent: pong (see fieldlight_mesh/handler.py).
  ping:
    trust_required: any
    ttl: 1
    fallback: [ghost]
    destination_format: "mesh://{target}/ping"
    auth: optional
    log: true
    msg_id: auto

  response:
    trust_required: peer
    ttl: 3
    fallback: [proxy]
    destination_format: "mesh://{originator}/response"
    auth: gpg_sig
    log: true
    msg_id: auto
